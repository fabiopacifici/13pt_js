<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <title>Our Team</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Catamaran:wght@400;600&family=Vidaloka&display=swap"
    rel="stylesheet" />
  <link rel="stylesheet" href="css/style.css" />
</head>

<body>


  <section>
    <div class="container">
      <form class="row">
        <div class="col">
          <label for="name">Name</label>
          <input type="text" id="name" name="name" placeholder="name">
        </div>
        <div class="col">
          <label for="role">Role</label>
          <input type="text" id="role" name="role" placeholder="role">
        </div>
        <div class="col">
          <label for="image">Image</label>
          <input type="text" id="image" name="image" placeholder="image">
        </div>
        <button type="submit">Add Member</button>
      </form>
    </div>

  </section>



  <div class="container">
    <section id="team">
      <h2 class="section-title">Our team</h2>
      <p class="section-description">
        Lorem ipsum dolor sit amet, consectetur adipiscing elit. Praesent in varius ante. Sed quis luctus eros.
        Phasellus rutrum laoreet leo in consequat.
      </p>
      <div class="team-container">
        <!-- Qui andranno tutte le card generate via JS -->

      </div>
    </section>
  </div>
  <script src="js/script.js"></script>
</body>

</html>
