<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Document</title>
  <link href='https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css' rel='stylesheet'
    integrity='sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH' crossorigin='anonymous'>
  <link rel="stylesheet" href="./assets/css/style.css">

</head>

<body>

  <div class="container">
    <form class="card p-3">
      <div class="row mb-3">
        <div class="col">
          <label for="full-name" class="form-label">Full Name</label>
          <input class="form-control" id="full-name" name="full-name" type="text" placeholder="Type passenger fullname"
            required>

        </div>
        <div class="col">
          <label for="age" class="form-label">Age</label>
          <input class="form-control" id="age" name="age" type="number" placeholder="Type your age" required>

        </div>
        <div class="col">
          <label for="km" class="form-label">Km</label>
          <input class="form-control" id="km" name="km" type="number" placeholder="Type Journey's km" required>
        </div>
      </div>

      <div class="d-flex justify-content-center gap-3">
        <button type="reset" class="btn btn-light">Reset</button>
        <button id="generate" type="submit" class="btn btn-dark">Generate</button>
      </div>
    </form>
  </div>

  <section id="ticket" class="d-none bg-red">
    <div class="container">
      <h2>Ticket Price</h2>
        <div class="card">
          <div class="card-body">
            <h3 id="passenger-name">[passenger-name]</h3>
            <div><strong>Offer: </strong><span id="offer">[offer-name]</span></div>
            <div>
              <span id="final_price">[final-price]</span>&euro;
            </div>
          </div>
          <div class="card-footer">
              <div><strong>Wagon: </strong><span id="wagon">[offer-name]</span></div>
              <div><strong>Cp code: </strong><span id="cp-code">[cp-code]</span></div>
          </div>
        </div>
    </div>
  </section>



  <script src="./assets/js/main.js"></script>
</body>

</html>
